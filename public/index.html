<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ripeness Classifier</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 50px; 
            background-color: #f4f4f9;
        }
        h2 { color: #333; }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        #display-container { 
            margin: 20px 0; 
            border: 4px solid #333; 
            border-radius: 8px; 
            overflow: hidden; 
            background-color: #000;
            min-width: 400px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #uploaded-image {
            display: none;
            max-width: 400px;
            max-height: 400px;
            object-fit: contain;
        }
        #label-container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* Updated Label and Bar Styles */
        .label-row { 
            display: flex; 
            flex-direction: column; /* Stack text above the bar */
            margin: 12px 0; 
        }
        .label-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 16px;
            font-weight: bold;
            color: #555;
        }
        .bar-bg {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 6px;
            height: 14px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        .bar-fill {
            height: 100%;
            width: 0%; /* Will be updated by JS */
            border-radius: 6px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        button, .custom-file-upload { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 5px; 
        }
        button {
            background-color: #28a745; 
            color: white; 
            border: none; 
            transition: background-color 0.2s;
        }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        input[type="file"] { display: none; }
        .custom-file-upload {
            background-color: #007bff;
            color: white;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .custom-file-upload:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Fruit Type & Ripeness Classifier</h2>
    
    <div class="controls">
        <button id="start-btn" type="button" onclick="initWebcam()">Start Camera</button>
        <span> OR </span>
        <label for="image-upload" class="custom-file-upload">Upload Image</label>
        <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
    </div>
    
    <div id="display-container">
        <div id="webcam-container"></div>
        <img id="uploaded-image" alt="Uploaded Preview" />
    </div>

    <div id="label-container"></div>

    <h3>Try the Advanced Pipeline</h3>
    <p>Uses a sequential two-model setup to detect fruit type, then ripeness.</p>
    <div class="nav-menu">
        <a href="pipeline.html" class="upload-btn btn">Launch Two-Stage Pipeline →</a>
    </div>

    <script type="text/javascript">
        const URL = "./combined_class/tfjs/";

        let model, webcam, labelContainer, maxPredictions;
        let isModelLoaded = false;
        let isWebcamRunning = false;

        async function loadModel() {
            if (isModelLoaded) return;
            
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; 
                
                // Pre-build the DOM structure for the bars
                for (let i = 0; i < maxPredictions; i++) {
                    const row = document.createElement("div");
                    row.className = "label-row";
                    row.innerHTML = `
                        <div class="label-header">
                            <span class="class-name">Loading...</span>
                            <span class="class-prob">0%</span>
                        </div>
                        <div class="bar-bg">
                            <div class="bar-fill"></div>
                        </div>
                    `;
                    labelContainer.appendChild(row);
                }
                isModelLoaded = true;
            } catch (error) {
                console.error("Error loading model:", error);
                alert("Failed to load the model. Ensure your local server is running.");
            }
        }

        async function initWebcam() {
            await loadModel();

            document.getElementById("uploaded-image").style.display = "none";
            const webcamContainer = document.getElementById("webcam-container");
            webcamContainer.style.display = "block";
            webcamContainer.innerHTML = ""; 

            document.getElementById("start-btn").disabled = true;

            const flip = true; 
            webcam = new tmImage.Webcam(400, 400, flip); 
            await webcam.setup(); 
            await webcam.play();
            isWebcamRunning = true;
            
            window.requestAnimationFrame(loop);
            webcamContainer.appendChild(webcam.canvas);
        }

        async function loop() {
            if (!isWebcamRunning) return;
            webcam.update(); 
            await predict(webcam.canvas);
            window.requestAnimationFrame(loop);
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            await loadModel();

            if (webcam && isWebcamRunning) {
                webcam.stop();
                isWebcamRunning = false;
                document.getElementById("webcam-container").style.display = "none";
                document.getElementById("start-btn").disabled = false;
            }

            const imgElement = document.getElementById("uploaded-image");
            imgElement.src = window.URL.createObjectURL(file);
            imgElement.style.display = "block";

            imgElement.onload = async () => {
                await predict(imgElement);
            };
        }

        async function predict(inputElement) {
            const prediction = await model.predict(inputElement);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probValue = prediction[i].probability * 100;
                const probabilityText = probValue.toFixed(1);
                
                // Target the specific row and its elements
                const row = labelContainer.childNodes[i];
                row.querySelector('.class-name').innerText = className;
                row.querySelector('.class-prob').innerText = probabilityText + '%';
                
                // Update the bar width
                const fillBar = row.querySelector('.bar-fill');
                fillBar.style.width = probabilityText + '%';
                
                // Change bar color based on confidence level
                if (probValue > 75) {
                    fillBar.style.backgroundColor = '#28a745'; // Green for high confidence
                } else if (probValue > 35) {
                    fillBar.style.backgroundColor = '#ffc107'; // Yellow for medium
                } else {
                    fillBar.style.backgroundColor = '#dc3545'; // Red for low
                }
            }
        }
    </script>
</body>
</html>
