<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Stage Fruit Classifier</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 30px; background-color: #f8f9fa; }
        .top-nav { width: 100%; max-width: 600px; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; margin: 20px 0; align-items: center;}
        #display-container { border: 4px solid #333; border-radius: 8px; background-color: #000; min-width: 400px; min-height: 400px; display: flex; justify-content: center; align-items: center; position: relative;}
        #uploaded-image { display: none; max-width: 400px; max-height: 400px; object-fit: contain; }
        
        /* New UI for the Pipeline Results */
        .result-card { width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 10px; text-align: center; border-top: 5px solid #007bff;}
        .step-title { font-size: 14px; color: #6c757d; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; margin-top: 15px;}
        .primary-result { font-size: 24px; font-weight: bold; color: #212529; }
        .confidence { font-size: 14px; color: #28a745; font-weight: bold;}
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; background-color: #e9ecef; font-size: 12px; margin-top: 10px; }

        button, .btn { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; text-decoration: none; color: white; border: none; }
        .start-btn { background-color: #28a745; }
        .upload-btn { background-color: #007bff; display: inline-block; }
        .back-btn { background-color: #333; padding: 8px 16px; font-size: 14px;}
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="btn back-btn">← Back to Universal Model</a>
    </div>

    <h2>Two-Stage Fruit Classifier</h2>
    
    <div class="controls">
        <button id="start-btn" class="start-btn" onclick="initWebcam()">Start Camera</button>
        <span> OR </span>
        <label for="image-upload" class="upload-btn btn">Upload Image</label>
        <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
    </div>
    
    <div id="display-container">
        <div id="webcam-container"></div>
        <img id="uploaded-image" alt="Uploaded Preview" />
    </div>

    <div class="result-card">
        <div class="step-title">Stage 1: Fruit Detected</div>
        <div id="type-result" class="primary-result">Waiting...</div>
        <div id="type-conf" class="confidence"></div>

        <div class="step-title">Stage 2: Ripeness Check</div>
        <div id="ripe-result" class="primary-result" style="color: #666;">-</div>
        <div id="ripe-conf" class="confidence"></div>
        
        <div id="system-status" class="status-badge">System Idle</div>
    </div>

    <script type="text/javascript">
        // --- MODEL URLS ---
        const typeURL = "./split_class/type/";
        const ripenessURLs = {
            "Apple": "./split_class/apel/",
            "Banana": "./split_class/banan/",
            "Mango": "./split_class/mango/"
        };

        // --- STATE VARIABLES ---
        let typeModel;
        let ripenessModel;
        let currentLoadedRipeness = ""; // Keeps track of which sub-model is in memory
        let webcam, isWebcamRunning = false;

        // 1. Load the Base "Type" Model
        async function loadBaseModel() {
            if (!typeModel) {
                document.getElementById("system-status").innerText = "Loading Base Model...";
                typeModel = await tmImage.load(typeURL + "model.json", typeURL + "metadata.json");
                document.getElementById("system-status").innerText = "Base Model Loaded.";
            }
        }

        // 2. Dynamically Load the specific Ripeness Model
        async function loadRipenessModel(fruitName) {
            // If it's already loaded in memory, don't waste time reloading it!
            if (currentLoadedRipeness === fruitName) return; 

            document.getElementById("system-status").innerText = `Loading ${fruitName} Ripeness Model...`;
            const url = ripenessURLs[fruitName];
            ripenessModel = await tmImage.load(url + "model.json", url + "metadata.json");
            currentLoadedRipeness = fruitName;
            document.getElementById("system-status").innerText = `${fruitName} Model Cached & Ready.`;
        }

        // --- CAMERA & FILE LOGIC ---
        async function initWebcam() {
            await loadBaseModel();
            document.getElementById("uploaded-image").style.display = "none";
            const wc = document.getElementById("webcam-container");
            wc.style.display = "block"; wc.innerHTML = ""; 
            document.getElementById("start-btn").disabled = true;

            webcam = new tmImage.Webcam(400, 400, true); 
            await webcam.setup(); await webcam.play();
            isWebcamRunning = true; window.requestAnimationFrame(loop);
            wc.appendChild(webcam.canvas);
        }

        async function loop() {
            if (!isWebcamRunning) return;
            webcam.update(); await predict(webcam.canvas);
            window.requestAnimationFrame(loop);
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            await loadBaseModel();
            if (webcam && isWebcamRunning) { webcam.stop(); isWebcamRunning = false; document.getElementById("webcam-container").style.display = "none"; document.getElementById("start-btn").disabled = false; }
            
            const imgElement = document.getElementById("uploaded-image");
            imgElement.src = window.URL.createObjectURL(file);
            imgElement.style.display = "block";
            imgElement.onload = async () => { await predict(imgElement); };
        }

        // --- THE CASCADING PREDICTION LOGIC ---
        async function predict(inputElement) {
            // STEP 1: Predict Fruit Type
            const typePrediction = await typeModel.predict(inputElement);
            
            // Find the class with the highest probability
            let bestType = typePrediction[0];
            for(let i=1; i < typePrediction.length; i++) {
                if(typePrediction[i].probability > bestType.probability) {
                    bestType = typePrediction[i];
                }
            }

            const fruitType = bestType.className; // e.g., "Apple", "Banana", "Other"
            document.getElementById("type-result").innerText = fruitType;
            document.getElementById("type-conf").innerText = (bestType.probability * 100).toFixed(1) + '% Match';

            // STEP 2: Conditional Ripeness Check
            if (fruitType === "Apple" || fruitType === "Banana" || fruitType === "Mango") {
                // Ensure the correct sub-model is loaded
                await loadRipenessModel(fruitType);
                
                // Run prediction on the Ripeness model
                const ripePrediction = await ripenessModel.predict(inputElement);
                
                // Find highest probability for ripeness
                let bestRipe = ripePrediction[0];
                for(let i=1; i < ripePrediction.length; i++) {
                    if(ripePrediction[i].probability > bestRipe.probability) {
                        bestRipe = ripePrediction[i];
                    }
                }

                document.getElementById("ripe-result").innerText = bestRipe.className;
                document.getElementById("ripe-result").style.color = "#212529";
                document.getElementById("ripe-conf").innerText = (bestRipe.probability * 100).toFixed(1) + '% Match';

            } else {
                // If it is "Other" or anything else, clear the ripeness results
                document.getElementById("ripe-result").innerText = "Not Applicable";
                document.getElementById("ripe-result").style.color = "#ccc";
                document.getElementById("ripe-conf").innerText = "";
            }
        }
    </script>
</body>
</html>
